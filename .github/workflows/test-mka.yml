name: Test mka

on:
  workflow_dispatch:

env:
  DEVICE: fajita
  VENDOR: oneplus
  HYBRIS_BRANCH: hybris-14.1
  ANDROID_ROOT: /parentroot/srv/hadk
  SAILFISH_SDK_VERSION: "4.5.0.16"

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Maximize space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 20480
          swap-size-mb: 4096
          remove-dotnet: "true"
          remove-haskell: "true"
          remove-android: "true"
          remove-docker-images: "true"

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-8-jdk android-tools-adb bc bison build-essential curl flex g++-multilib gcc-multilib gnupg gperf imagemagick lib32ncurses-dev qemu-user-static lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc yasm zip zlib1g-dev qemu-user-static qemu-system-arm e2fsprogs simg2img libtinfo5 libncurses5 gzip virtualenv git python2

      - name: Download repo
        run: |
          mkdir -p ~/bin
          wget -q https://storage.googleapis.com/git-repo-downloads/repo -P ~/bin
          chmod +x ~/bin/repo
          git config --global user.name "Test"
          git config --global user.email "test@test.com"

      - name: Start SDK
        run: |
          sudo docker pull coderus/sailfishos-platform-sdk:$SAILFISH_SDK_VERSION
          sudo docker run --privileged --name sailfish-sdk -d coderus/sailfishos-platform-sdk:$SAILFISH_SDK_VERSION tail -f /dev/null

      - name: Prepare dirs
        run: |
          sleep 10
          sudo docker exec sailfish-sdk mkdir -p /parentroot/srv/hadk ~/bin
          sudo docker cp ~/bin/repo sailfish-sdk:/home/mersdk/bin/repo

      - name: Init repo
        run: |
          sudo docker exec sailfish-sdk bash -c "export PATH=$PATH:~/bin && cd /parentroot/srv/hadk && repo init -u https://github.com/mer-hybris/android.git -b hybris-14.1 --depth=1"

      - name: Sync repo
        run: |
          sudo docker exec sailfish-sdk bash -c "export PATH=$PATH:~/bin && cd /parentroot/srv/hadk && repo sync -j8 -c --no-clone-bundle --no-tags"
        timeout-minutes: 30

      - name: Try mka hybris-hal
        run: |
          sudo docker exec sailfish-sdk bash -c "export JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64 && export PATH=$JAVA_HOME/bin:$PATH && cd /parentroot/srv/hadk && source build/envsetup.sh 2>&1 && make -j$(nproc) hybris-hal 2>&1 | head -50"
        timeout-minutes: 10

      - name: Check
        if: always()
        run: |
          sudo docker logs sailfish-sdk 2>&1 | tail -50