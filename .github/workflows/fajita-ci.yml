name: Build SailfishOS for fajita with Docker kernel
on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DEVICE: fajita
  RELEASE: 5.0.0.73
  KERNEL_REPO: https://github.com/VerdandiTeam/android_kernel_oneplus_sdm845-stable.git
  KERNEL_BRANCH: lineage-16.0
  CONFIG_GZ_URL: https://github.com/gmicroul/fajita-sfos-ci/releases/download/droid-boot/config.gz
  BUSYBOX_URL: https://github.com/gmicroul/fajita-sfos-ci/releases/download/droid-boot/busybox

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Sailfish SDK Docker
        run: |
          sudo docker pull coderus/sailfishos-platform-sdk:latest
          sudo docker run --privileged --name sailfish-sdk -d coderus/sailfishos-platform-sdk:latest tail -f /dev/null
          sleep 5
          sudo docker exec sailfish-sdk gcc --version

      - name: Build kernel and hybris-boot in SDK
        run: |
          # 上传所有需要的文件
          mkdir -p _build
          cp scripts/generate-docker-defconfig.sh _build/
          cp scripts/build-hybris-boot.sh _build/
          sudo docker cp _build sailfish-sdk:/home/build/
          
          # 在 SDK 里完成一切
          sudo docker exec -u root -e DEVICE=fajita \
            -e KERNEL_REPO="${{ env.KERNEL_REPO }}" \
            -e KERNEL_BRANCH="${{ env.KERNEL_BRANCH }}" \
            -e CONFIG_GZ_URL="${{ env.CONFIG_GZ_URL }}" \
            -e BUSYBOX_URL="${{ env.BUSYBOX_URL }}" \
            sailfish-sdk bash -c '
            set -e
            cd /home/build

            # 安装依赖
            zypper -n install -y git bc bison flex make curl cpio

            # clone 内核
            git clone --single-branch --branch $KERNEL_BRANCH $KERNEL_REPO kernel_src

            # 下载 config.gz 生成 defconfig
            curl -L -o config.gz "$CONFIG_GZ_URL"
            bash generate-docker-defconfig.sh config.gz kernel_src/arch/arm64/configs/fajita_docker_defconfig

            # 补头文件
            cd kernel_src
            mkdir -p include include/trace include/function
            for d in drivers/bluetooth drivers/clk/qcom/mdss techpack/audio/asoc drivers/gpu/msm drivers/media/platform/msm/camera_oneplus/cam_core drivers/media/platform/msm/camera_oneplus/cam_utils drivers/media/platform/msm/camera_oneplus/cam_isp/isp_hw_mgr drivers/media/platform/msm/camera_oneplus/cam_req_mgr drivers/media/platform/msm/camera_oneplus/cam_sync drivers/platform/msm/ipa/ipa_v3 drivers/soc/qcom drivers/usb/gadget/function; do
              find $d -name "*.h" -exec cp {} include/ \; 2>/dev/null || true
            done
            echo "headers done"

            # 编译
            export ARCH=arm64
            export CROSS_COMPILE=/opt/cross/bin/aarch64-meego-linux-gnu-
            # PATH 也要加进去
            export PATH="/opt/cross/bin:$PATH"
            make fajita_docker_defconfig
            scripts/config --disable WERROR
            scripts/config --disable CC_STACKPROTECTOR 2>/dev/null || true
            scripts/config --disable CC_STACKPROTECTOR_STRONG 2>/dev/null || true
            make olddefconfig
            make -j$(nproc) Image.gz dtbs KCFLAGS="-Wno-error" WERROR=0
            cat arch/arm64/boot/Image.gz arch/arm64/boot/dts/qcom/sdm845-v2.1.dtb > arch/arm64/boot/Image.gz-dtb
            ls -la arch/arm64/boot/Image.gz-dtb

            # 构建 hybris-boot
            cd /home/build
            bash build-hybris-boot.sh /home/build/kernel_src/arch/arm64/boot/Image.gz-dtb /home/build/hybris-boot.img
          '
          
          # 拷出产物
          mkdir -p output
          sudo docker cp sailfish-sdk:/home/build/hybris-boot.img output/

      - name: Upload hybris-boot.img
        uses: actions/upload-artifact@v4
        with:
          name: hybris-boot-docker-kernel
          path: output/hybris-boot.img
          retention-days: 5

      - name: Cleanup
        if: always()
        run: |
          sudo docker stop sailfish-sdk 2>/dev/null || true
          sudo docker rm sailfish-sdk 2>/dev/null || true