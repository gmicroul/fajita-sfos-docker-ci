name: Build Mainline Kernel for fajita with Docker
on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  KERNEL_TAG: sdm845-6.18.2-r0
  KERNEL_REPO: https://gitlab.com/sdm845-mainline/linux.git
  BUSYBOX_URL: https://github.com/gmicroul/fajita-sfos-ci/releases/download/droid-boot/busybox

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-12-aarch64-linux-gnu bc bison flex git curl cpio mkbootimg

      - name: Setup cross-compiler
        run: |
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-12 /usr/bin/aarch64-linux-gnu-gcc || true

      - name: Clone mainline kernel
        run: |
          git clone --depth 1 --branch ${{ env.KERNEL_TAG }} ${{ env.KERNEL_REPO }} kernel_src

      - name: Generate defconfig (defconfig + sdm845 + Docker + hybris-boot)
        run: |
          cd kernel_src
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          make defconfig
          scripts/kconfig/merge_config.sh -m .config arch/arm64/configs/sdm845.config

          cat >> .config << 'CFGEOF'
          # Docker essentials
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_CGROUP_PIDS=y
          CONFIG_CGROUP_HUGETLB=y
          CONFIG_MEMCG=y
          CONFIG_MEMCG_V1=y
          CONFIG_BLK_CGROUP=y
          CONFIG_NAMESPACES=y
          CONFIG_USER_NS=y
          CONFIG_PID_NS=y
          CONFIG_NET_NS=y
          CONFIG_UTS_NS=y
          CONFIG_IPC_NS=y
          CONFIG_OVERLAY_FS=y
          CONFIG_VETH=y
          CONFIG_BRIDGE=y
          CONFIG_BRIDGE_NETFILTER=y
          CONFIG_DUMMY=y
          CONFIG_MACVLAN=y
          CONFIG_IPVLAN=y
          CONFIG_VXLAN=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_IP_NF_NAT=y
          CONFIG_NF_NAT=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          CONFIG_IP_SET=y
          CONFIG_IP_VS=y
          CONFIG_IP_VS_PROTO_TCP=y
          CONFIG_IP_VS_PROTO_UDP=y
          CONFIG_SECCOMP=y
          CONFIG_SECCOMP_FILTER=y
          CONFIG_EXT4_FS_POSIX_ACL=y

          # hybris-boot requirements
          CONFIG_DEVTMPFS=y
          CONFIG_DEVTMPFS_MOUNT=y
          CONFIG_IKCONFIG=y
          CONFIG_IKCONFIG_PROC=y
          CONFIG_RD_GZIP=y
          CONFIG_SYSVIPC=y
          CONFIG_VT=y
          CONFIG_INOTIFY_USER=y
          CONFIG_SIGNALFD=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_AUTOFS4_FS=y
          CFGEOF

          make olddefconfig
          echo "Config ready: $(wc -l < .config) lines"

      - name: Compile kernel
        run: |
          cd kernel_src
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc) Image.gz dtbs 2>&1 | tail -20
          cat arch/arm64/boot/Image.gz arch/arm64/boot/dts/qcom/sdm845-oneplus-fajita.dtb > arch/arm64/boot/Image.gz-dtb
          ls -la arch/arm64/boot/Image.gz-dtb

      - name: Build hybris-boot.img
        run: |
          mkdir -p output
          cp scripts/build-hybris-boot.sh .
          bash build-hybris-boot.sh kernel_src/arch/arm64/boot/Image.gz-dtb output/hybris-boot.img
          ls -la output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: hybris-boot-mainline
          path: output/hybris-boot.img
          retention-days: 3