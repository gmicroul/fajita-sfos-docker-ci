name: Build SailfishOS for fajita with Docker kernel
on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DEVICE: fajita
  VENDOR: oneplus
  RELEASE: 5.0.0.73
  PORT_ARCH: aarch64
  KERNEL_REPO: https://github.com/VerdandiTeam/android_kernel_oneplus_sdm845-stable.git
  KERNEL_BRANCH: lineage-16.0
  HYBRIS_BOOT_URL: https://github.com/gmicroul/fajita-sfos-ci/releases/download/droid-boot/hybris-boot.img

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install kernel build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-12-aarch64-linux-gnu g++-12-aarch64-linux-gnu libssl-dev bc bison flex libncurses5-dev libncurses-dev git wget curl unzip xz-utils cpio

      - name: Create kernel build symlinks
        run: |
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-12 /usr/bin/aarch64-linux-gnu-gcc || true
          sudo ln -sf /usr/bin/aarch64-linux-gnu-g++-12 /usr/bin/aarch64-linux-gnu-g++ || true
          aarch64-linux-gnu-gcc --version

      - name: Clone kernel source
        run: |
          git clone --single-branch --branch ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_REPO }} kernel_src
          ls -la kernel_src/

      - name: Download missing kernel headers
        run: |
          cd kernel_src
          mkdir -p include
          # Copy headers from cloned kernel source
          cp -f drivers/bluetooth/btfm_slim.h include/
          cp -f drivers/bluetooth/btfm_slim_wcn3990.h include/
          cp -f drivers/clk/qcom/mdss/mdss_pll_trace.h include/trace/
          cp -f techpack/audio/asoc/device_event.h include/
          # Copy ALL .h files from drivers/gpu/msm/
          cp -f drivers/gpu/msm/*.h include/
          ls -la include/kgsl*.h include/adreno*.h 2>/dev/null | wc -l

      - name: Prepare defconfig
        run: |
          cd kernel_src
          if [ ! -f arch/arm64/configs/fajita_defconfig ]; then
            cp arch/arm64/configs/enchilada_defconfig arch/arm64/configs/fajita_defconfig
          fi
          ls -la arch/arm64/configs/fajita_defconfig

      - name: Apply Docker kernel patches
        run: |
          cd kernel_src
          bash ../scripts/apply-docker-kernel-patch-v2.sh

      - name: Build Docker kernel
        run: |
          cd kernel_src
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export KCFLAGS="-Wno-error -fno-stack-protector"
          export WERROR=0
          make fajita_defconfig
          sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/CONFIG_CC_STACKPROTECTOR_STRONG=n/g' .config || true
          sed -i 's/CONFIG_CC_STACKPROTECTOR=y/CONFIG_CC_STACKPROTECTOR=n/g' .config || true
          make -j$(nproc) Image.gz WERROR=0
          ls -la arch/arm64/boot/Image.gz

      - name: Download base hybris-boot.img
        run: |
          mkdir -p boot_images
          wget -q -O boot_images/hybris-boot.img ${{ env.HYBRIS_BOOT_URL }}
          ls -la boot_images/

      - name: Repack boot.img with new kernel
        run: |
          cd boot_images
          if ! command -v abootimg &> /dev/null; then
            sudo apt-get install -y abootimg
          fi
          abootimg -x hybris-boot.img
          cp ../kernel_src/arch/arm64/boot/Image.gz ./zImage
          abootimg --create hybris-boot-new.img -f bootimg.cfg -k zImage -r initrd.img
          ls -la hybris-boot-new.img
          abootimg -i hybris-boot-new.img

      - name: Set up Docker container
        run: |
          sudo docker pull coderus/sailfishos-platform-sdk-base:latest
          sudo docker run --privileged --name sailfish-sdk -d coderus/sailfishos-platform-sdk-base:latest tail -f /dev/null
          sleep 5

      - name: Prepare workspace in container
        run: |
          mkdir -p workspace
          cp fajita.env run-mic1.sh Jolla-@RELEASE@-fajita-@ARCH@.ks workspace/
          cp boot_images/hybris-boot-new.img workspace/hybris-boot.img
          sudo docker cp workspace sailfish-sdk:/workspace
          ls -la workspace/

      - name: Check Docker container
        run: |
          sudo docker exec sailfish-sdk ls -la /workspace/

      - name: Run mic build inside Docker
        run: |
          sudo docker exec sailfish-sdk sh -c "cd /workspace && source ./fajita.env && sudo bash ./run-mic1.sh"

      - name: Find build output
        run: |
          echo "=== Checking build output ==="
          sudo docker exec sailfish-sdk ls -la /workspace/
          sudo docker exec sailfish-sdk find /workspace -name "*.zip" 2>/dev/null || true
          sudo docker exec sailfish-sdk find /workspace -name "sfe-*" -type d 2>/dev/null || true

      - name: Archive artifacts
        run: |
          sudo mkdir -p artifacts/
          OUTPUT_DIR=$(sudo docker exec sailfish-sdk ls /workspace/ | grep sfe- | head -1)
          if [ -n "$OUTPUT_DIR" ]; then
            sudo docker cp sailfish-sdk:/workspace/$OUTPUT_DIR/sailfishos-*.zip artifacts/
          fi
          cp boot_images/hybris-boot-new.img artifacts/
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sailfishos-fajita-5.0.0.73-docker-kernel
          path: artifacts/*.zip
          retention-days: 5

      - name: Upload hybris-boot.img
        uses: actions/upload-artifact@v4
        with:
          name: hybris-boot-docker-kernel
          path: artifacts/hybris-boot-new.img
          retention-days: 5

      - name: Cleanup
        if: always()
        run: |
          sudo docker stop sailfish-sdk 2>/dev/null || true
          sudo docker rm sailfish-sdk 2>/dev/null || true
          rm -rf workspace kernel_src boot_images