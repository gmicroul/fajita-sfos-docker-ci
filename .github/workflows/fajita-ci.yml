name: Build kernel from device config (pure, no modifications)
on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  KERNEL_REPO: https://github.com/VerdandiTeam/android_kernel_oneplus_sdm845-stable.git
  KERNEL_BRANCH: lineage-16.0
  CONFIG_GZ_URL: https://github.com/gmicroul/fajita-sfos-ci/releases/download/droid-boot/config.gz

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-12-aarch64-linux-gnu bc bison flex git curl cpio mkbootimg abootimg

      - name: Set cross-compiler symlinks
        run: |
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-12 /usr/bin/aarch64-linux-gnu-gcc || true

      - name: Clone kernel source
        run: |
          git clone --single-branch --branch ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_REPO }} kernel_src

      - name: Use device config.gz directly as defconfig
        run: |
          wget -q -O config.gz ${{ env.CONFIG_GZ_URL }}
          zcat config.gz > kernel_src/arch/arm64/configs/fajita_pure_defconfig
          rm config.gz

      - name: Copy missing headers
        run: |
          cd kernel_src
          mkdir -p include include/trace include/function
          cp -f drivers/bluetooth/btfm_slim.h include/ 2>/dev/null || true
          cp -f drivers/bluetooth/btfm_slim_wcn3990.h include/ 2>/dev/null || true
          cp -f drivers/clk/qcom/mdss/mdss_pll_trace.h include/trace/ 2>/dev/null || true
          cp -f techpack/audio/asoc/device_event.h include/ 2>/dev/null || true
          cp -f drivers/gpu/msm/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_core/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_utils/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_isp/isp_hw_mgr/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_isp/isp_hw_mgr/hw_utils/include/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_req_mgr/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_sensor_module/cam_sensor_utils/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_sync/*.h include/ 2>/dev/null || true
          cp -f drivers/platform/msm/ipa/ipa_v3/ipa_trace.h include/trace/ 2>/dev/null || true
          cp -f drivers/platform/msm/ipa/ipa_clients/rndis_ipa_trace.h include/trace/ 2>/dev/null || true
          cp -f drivers/soc/qcom/tracer_pkt_private.h include/trace/ 2>/dev/null || true
          cp -f drivers/usb/gadget/function/u_ncm.h include/function/ 2>/dev/null || true

      - name: Compile kernel (pure, no config changes)
        run: |
          cd kernel_src
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make fajita_pure_defconfig
          # 不修改任何配置，直接编译
          make -j$(nproc) Image.gz KCFLAGS="-Wno-error" WERROR=0 2>&1 | tail -10
          ls -la arch/arm64/boot/Image.gz
          echo "Pure kernel done"

      - name: Build boot.img (use original hybris-boot ramdisk)
        run: |
          # 从原始 hybris-boot.img 提取 ramdisk
          wget -q -O hybris-boot.img "https://github.com/gmicroul/fajita-sfos-ci/releases/download/droid-boot/hybris-boot.img"
          abootimg -x hybris-boot.img
          cp kernel_src/arch/arm64/boot/Image.gz ./zImage
          abootimg --create boot-pure.img -f bootimg.cfg -k zImage -r initrd.img
          abootimg -i boot-pure.img
          ls -la boot-pure.img

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: pure-kernel-boot
          path: boot-pure.img
          retention-days: 3