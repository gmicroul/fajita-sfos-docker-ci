name: Build SailfishOS for fajita with Docker kernel
on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DEVICE: fajita
  RELEASE: 5.0.0.73
  PORT_ARCH: aarch64
  KERNEL_REPO: https://github.com/VerdandiTeam/android_kernel_oneplus_sdm845-stable.git
  KERNEL_BRANCH: lineage-16.0
  CONFIG_GZ_URL: https://github.com/gmicroul/fajita-sfos-ci/releases/download/droid-boot/config.gz
  DTB_URL: https://github.com/gmicroul/fajita-sfos-ci/releases/download/droid-boot/sfos-dtb-single

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install kernel build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-12-aarch64-linux-gnu g++-12-aarch64-linux-gnu libssl-dev bc bison flex libncurses-dev git wget curl xz-utils cpio

      - name: Create kernel build symlinks
        run: |
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-12 /usr/bin/aarch64-linux-gnu-gcc || true
          sudo ln -sf /usr/bin/aarch64-linux-gnu-g++-12 /usr/bin/aarch64-linux-gnu-g++ || true

      - name: Clone kernel source
        run: |
          git clone --single-branch --branch ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_REPO }} kernel_src

      - name: Download device config.gz and generate defconfig
        run: |
          wget -q -O config.gz ${{ env.CONFIG_GZ_URL }}
          bash scripts/generate-docker-defconfig.sh config.gz kernel_src/arch/arm64/configs/fajita_docker_defconfig
          rm config.gz

      - name: Copy missing headers from kernel source
        run: |
          cd kernel_src
          mkdir -p include include/trace include/function
          cp -f drivers/bluetooth/btfm_slim.h include/ 2>/dev/null || true
          cp -f drivers/bluetooth/btfm_slim_wcn3990.h include/ 2>/dev/null || true
          cp -f drivers/clk/qcom/mdss/mdss_pll_trace.h include/trace/ 2>/dev/null || true
          cp -f techpack/audio/asoc/device_event.h include/ 2>/dev/null || true
          cp -f drivers/gpu/msm/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_core/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_utils/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_isp/isp_hw_mgr/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_isp/isp_hw_mgr/hw_utils/include/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_req_mgr/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_sensor_module/cam_sensor_utils/*.h include/ 2>/dev/null || true
          cp -f drivers/media/platform/msm/camera_oneplus/cam_sync/*.h include/ 2>/dev/null || true
          cp -f drivers/platform/msm/ipa/ipa_v3/ipa_trace.h include/trace/ 2>/dev/null || true
          cp -f drivers/platform/msm/ipa/ipa_clients/rndis_ipa_trace.h include/trace/ 2>/dev/null || true
          cp -f drivers/soc/qcom/tracer_pkt_private.h include/trace/ 2>/dev/null || true
          cp -f drivers/usb/gadget/function/u_ncm.h include/function/ 2>/dev/null || true
          echo "Headers copied"

- name: Build Docker kernel
        run: |
          cd kernel_src
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make fajita_docker_defconfig
          scripts/config --disable WERROR
          scripts/config --disable CC_STACKPROTECTOR
          scripts/config --disable CC_STACKPROTECTOR_STRONG
          make olddefconfig
          make -j$(nproc) Image.gz KCFLAGS="-Wno-error -fno-stack-protector" WERROR=0
          # 下载 DTB 并拼接到 Image.gz
          wget -q -O dtb ${{ env.DTB_URL }}
          cat arch/arm64/boot/Image.gz dtb > arch/arm64/boot/Image.gz-dtb
          ls -la arch/arm64/boot/Image.gz-dtb

      - name: Set up Sailfish SDK Docker
        run: |
          sudo docker pull coderus/sailfishos-platform-sdk-base:latest
          sudo docker run --privileged --name sailfish-sdk -d coderus/sailfishos-platform-sdk-base:latest tail -f /dev/null
          sleep 5

      - name: Build hybris-boot.img in SDK
        run: |
          # 把内核和脚本复制进 SDK 容器
          mkdir -p build
          cp kernel_src/arch/arm64/boot/Image.gz-dtb build/
          cp scripts/build-hybris-boot.sh build/
          sudo docker cp build sailfish-sdk:/home/
          # 在容器里构建
          sudo docker exec sailfish-sdk bash /home/build/build-hybris-boot.sh /home/build/Image.gz-dtb /home/build/hybris-boot.img
          # 复制出来
          mkdir -p output
          sudo docker cp sailfish-sdk:/home/build/hybris-boot.img output/

      - name: Copy files for mic build
        run: |
          mkdir -p workspace
          cp fajita.env run-mic1.sh Jolla-@RELEASE@-fajita-@ARCH@.ks workspace/
          cp output/hybris-boot.img workspace/
          sudo docker cp workspace sailfish-sdk:/workspace

      - name: Run mic build
        run: |
          sudo docker exec sailfish-sdk sh -c "cd /workspace && source ./fajita.env && sudo bash ./run-mic1.sh"

      - name: Collect artifacts
        run: |
          sudo mkdir -p artifacts/
          sudo cp output/hybris-boot.img artifacts/
          ZIP_FILE=$(sudo docker exec sailfish-sdk find /workspace -name "sailfishos-*.zip" -type f 2>/dev/null | head -1)
          if [ -n "$ZIP_FILE" ]; then
            sudo docker cp sailfish-sdk:$ZIP_FILE artifacts/
          fi
          ls -la artifacts/

      - name: Upload hybris-boot.img
        uses: actions/upload-artifact@v4
        with:
          name: hybris-boot-docker-kernel
          path: artifacts/hybris-boot.img
          retention-days: 5

      - name: Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: sailfishos-fajita-docker-kernel
          path: artifacts/sailfishos-*.zip
          retention-days: 5

      - name: Cleanup
        if: always()
        run: |
          sudo docker stop sailfish-sdk 2>/dev/null || true
          sudo docker rm sailfish-sdk 2>/dev/null || true